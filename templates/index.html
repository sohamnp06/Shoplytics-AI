<!DOCTYPE html>
<html>
<head>
    <title>Sales Data Entry</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
        }
        form {
            max-width: 500px;
        }
        input, select {
            width: 100%;
            margin-bottom: 10px;
            padding: 8px;
        }
        button {
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
        }
        .message {
            margin-bottom: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h2>📊 Sales Data Entry</h2>

{% if message %}
<div class="message">{{ message }}</div>
{% endif %}

<form action="/submit" method="post">

<label>Order ID</label>
<input name="Order_ID" required>

<label>Customer ID</label>
<input name="Customer_ID" required>

<label>Date (DD-MM-YYYY)</label>
<input name="Date" required>

<label>Age</label>
<input type="number" name="Age" required>

<label>Gender</label>
<select name="Gender">
    <option>Male</option>
    <option>Female</option>
</select>

<label>City</label>
<input name="City" required>

<label>Product Category</label>
<select name="Product_Category">
    <option>Electronics</option>
    <option>Clothing</option>
    <option>Home</option>
</select>

<label>Unit Price</label>
<input type="number" step="0.01" name="Unit_Price" required>

<label>Quantity</label>
<input type="number" name="Quantity" required>

<label>Discount Amount</label>
<input type="number" step="0.01" name="Discount_Amount">

<label>Total Amount</label>
<input type="number" step="0.01" name="Total_Amount" required>

<label>Payment Method</label>
<select name="Payment_Method">
    <option>UPI</option>
    <option>Card</option>
    <option>Cash on Delivery</option>
</select>

<label>Device Type</label>
<select name="Device_Type">
    <option>Mobile</option>
    <option>Desktop</option>
</select>

<label>Session Duration (minutes)</label>
<input type="number" name="Session_Duration_Minutes">

<label>Pages Viewed</label>
<input type="number" name="Pages_Viewed">

<label>Returning Customer</label>
<select name="Is_Returning_Customer">
    <option value="1">Yes</option>
    <option value="0">No</option>
</select>

<label>Delivery Time (Days)</label>
<input type="number" name="Delivery_Time_Days">

<label>Customer Rating (1–5)</label>
<select name="Customer_Rating">
    <option>1</option>
    <option>2</option>
    <option>3</option>
    <option>4</option>
    <option>5</option>
</select>

<button type="submit">Submit</button>

</form>

</body>
</html>
